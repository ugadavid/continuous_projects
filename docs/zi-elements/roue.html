<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roue de tirage au sort</title>
<style>
  body {
    background:#f2f2f2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Lexend, sans-serif;
  }
  canvas {
    border-radius:50%;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    margin-bottom:20px;
  }
  button {
    background:#4A90E2;
    border:none;
    color:white;
    padding:12px 24px;
    border-radius:8px;
    cursor:pointer;
    font-size:1.1em;
    transition:background .3s;
  }
  button:hover { background:#357ABD; }
  #result {
    margin-top:15px;
    font-size:1.2em;
    color:#333;
    height:1.4em;
  }
</style>
</head>
<body>

<canvas id="wheel" width="400" height="400"></canvas>
<button id="spin">🎡 Tourner la roue</button>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");
const spinBtn = document.getElementById("spin");

// 🟩 Liste des segments
const options = ["David", "Luca", "Neslihan", "Anderson", "Carole", "Beci", "Hubert", "Sophie"];

// 🎨 Couleurs de segments
const colors = ["#4A90E2", "#F5A623", "#7ED321", "#D0021B", "#50E3C2", "#9013FE", "#B8E986", "#F8E71C"];

let startAngle = 0;
let arc = (2 * Math.PI) / options.length;
let spinAngle = 0;
let spinVelocity = 0;
let spinning = false;

function drawWheel() {
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const radius = canvas.width / 2;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dessine les parts
  for (let i = 0; i < options.length; i++) {
    const angle = startAngle + i * arc;
    ctx.beginPath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, angle, angle + arc);
    ctx.fill();
    ctx.save();

    // Texte du segment
    ctx.translate(centerX, centerY);
    ctx.rotate(angle + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px Lexend";
    ctx.fillText(options[i], radius - 10, 10);
    ctx.restore();
  }

  // Flèche du haut
  ctx.beginPath();
  ctx.moveTo(centerX - 10, 10);
  ctx.lineTo(centerX + 10, 10);
  ctx.lineTo(centerX, 30);
  ctx.closePath();
  ctx.fillStyle = "#333";
  ctx.fill();
}

function rotateWheel() {
  if (!spinning) return;
  spinVelocity *= 0.985; // friction
  startAngle += spinVelocity;

  if (spinVelocity < 0.002) {
    spinning = false;
    spinVelocity = 0;
    announceWinner();
  }

  drawWheel();
  requestAnimationFrame(rotateWheel);
}

function announceWinner() {
  const degrees = (startAngle * 180 / Math.PI) % 360;
  const index = Math.floor(((360 - degrees + 90) % 360) / (360 / options.length));
  const winner = options[index];
  result.textContent = `🎉 Gagnant : ${winner} !`;
}

spinBtn.addEventListener("click", () => {
  if (spinning) return;
  result.textContent = "";
  spinVelocity = 0.35 + Math.random() * 0.2; // vitesse initiale aléatoire
  spinning = true;
  rotateWheel();
});

drawWheel();
</script>
</body>
</html>
